version: '3.4'

services:

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    command: >
      redis-server
      --requirepass Tourchain@123456
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --maxmemory-samples 10
      --save ""
      --appendonly no
      --tcp-keepalive 60
      --timeout 300
      --hz 10
      --maxclients 5000
      --io-threads 4
      --io-threads-do-reads yes
      --lazyfree-lazy-eviction yes
      --lazyfree-lazy-expire yes
      --lazyfree-lazy-server-del yes
      --lazyfree-lazy-user-del yes
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "Tourchain@123456", "--no-auth-warning", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2560M
        reservations:
          memory: 512M
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 10
        window: 60s
    networks:
        - general

networks:
  general:
    external:
      name: infrastructure_default
